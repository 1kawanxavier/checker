{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        .page {
            min-height: 100vh;
            padding: 24px 16px 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-light {
            background: white;
            color: #374151;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        .btn-primary {
            background: #0ea5ff;
            color: white;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 26px rgba(0,0,0,0.06);
        }

        .card p {
            margin-bottom: 16px;
        }

        .card label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .card input,
        .card select,
        .card textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <div class="topbar">
                <h1>{{ titulo }}</h1>
                <a href="{% url 'admin_detalhe_imovel' imovel.id %}" class="btn btn-light">Voltar</a>
            </div>

            <form method="post" enctype="multipart/form-data" class="card">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
